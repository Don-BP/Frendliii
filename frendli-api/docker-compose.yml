version: '3.8'

services:
  db:
    image: postgres:15
    container_name: frendli-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: frendlidb
    ports:
      - '5432:5432'
    volumes:
      - frendli-db-data:/var/lib/postgresql/data

volumes:
  frendli-db-data:
